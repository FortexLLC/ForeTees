# ForeTees Auto-Booker — Inverness Club
# Runs every Monday morning to book Saturday tee times.
#
# CRON STRATEGY: GitHub Actions cron can be delayed 5-60 minutes.
# We schedule at 5:30 AM MT so even with a worst-case 60-min delay,
# the runner is up by 6:30. The script waits until 6:58 to log in
# and 7:00:00 sharp to book — so early start just means longer idle.
#
# DST REMINDER — Update the cron schedule twice a year:
#   Summer (MDT, mid-Mar to early-Nov): 30 11 * * 1  (5:30am MDT = 11:30am UTC)
#   Winter (MST, early-Nov to mid-Mar): 30 12 * * 1  (5:30am MST = 12:30pm UTC)
#
# Denver DST dates:
#   Spring forward: 2nd Sunday of March
#   Fall back: 1st Sunday of November

name: Book Tee Time

on:
  schedule:
    # 5:30am MDT (UTC-6) — buffer for GitHub Actions cron delays
    - cron: '30 11 * * 1'
  workflow_dispatch:  # Manual trigger for testing

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Script idles from ~5:30am until 7:00am booking window

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright pytz python-dotenv
          playwright install chromium --with-deps

      - name: Run booking script
        env:
          FORETEES_MEMBER: ${{ secrets.FORETEES_MEMBER }}
          FORETEES_PASSWORD: ${{ secrets.FORETEES_PASSWORD }}
        run: python foretees_booker.py

      - name: Upload screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-results
          path: |
            *.png
            *.log
          retention-days: 30
